<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1c8"/>
      <stop offset="0.5" stop-color="#ffd9e4"/>
      <stop offset="1" stop-color="#c9f2ea"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a59"/>
      <stop offset="1" stop-color="#ef4d68"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#93593e" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="960" height="320" rx="28" fill="url(#bg)"/>

  <!-- app mark -->
  <g filter="url(#soft)">
    <rect x="70" y="104" width="112" height="112" rx="30" fill="#ffffff"/>
    <text x="126" y="182" font-size="64" text-anchor="middle">🍽️</text>
  </g>

  <!-- title -->
  <text x="214" y="150" font-size="62" font-weight="900" fill="#2f241f">Panic Buffet</text>
  <text x="216" y="196" font-size="22" fill="#6c5a51">3分間、在庫を切らさずお客の波をさばくビュッフェ管理ゲーム。</text>

  <!-- control chips -->
  <g font-size="22" fill="#6f594f">
    <rect x="216" y="222" width="74" height="44" rx="22" fill="#ffffff" opacity="0.78"/>
    <text x="253" y="251" text-anchor="middle">🍕 1</text>
    <rect x="300" y="222" width="74" height="44" rx="22" fill="#ffffff" opacity="0.78"/>
    <text x="337" y="251" text-anchor="middle">🍝 2</text>
    <rect x="384" y="222" width="78" height="44" rx="22" fill="#ffffff" opacity="0.78"/>
    <text x="423" y="251" text-anchor="middle">🥤 3</text>
  </g>

  <!-- start button -->
  <g filter="url(#soft)">
    <rect x="744" y="222" width="150" height="50" rx="16" fill="url(#btn)"/>
    <text x="819" y="254" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle">START</text>
  </g>

  <!-- queue of happy customers -->
  <g font-size="40" text-anchor="middle">
    <text x="560" y="120">😀</text>
    <text x="630" y="120">🙂</text>
    <text x="700" y="120">😋</text>
    <text x="770" y="120">🤤</text>
    <text x="840" y="120">😄</text>
  </g>
</svg>
